appId: com.codesense.app
productName: CodeSense
directories:
  output: dist-electron
  buildResources: resources

files:
  - dist/main/**
  - dist/preload/**
  - dist/renderer/**

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: resources/icon.icns

win:
  target:
    - nsis
  icon: resources/icon.png

linux:
  target:
    - deb
    - rpm
    - AppImage
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
